<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="120" height="120" rx="27"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="27" fill="#111827"/>

  <g clip-path="url(#round)">
    <!-- White left bar -->
    <rect x="15" y="10" width="17" height="78" rx="5" fill="white"/>

    <!-- Teal upper arm of K -->
    <path d="M32,10 L83,10 Q92,10 91,19 L49,55 L32,55 Z" fill="url(#armGrad)"/>

    <!-- Pie chart outer ring / shadow -->
    <circle cx="68" cy="67" r="25" fill="#0F172A"/>

    <!-- Pie segments -->
    <path d="M68,67 L93,67 A25,25 0 0,0 68,42 Z" fill="#2DD4BF"/>
    <path d="M68,67 L68,42 A25,25 0 0,0 43,67 Z" fill="#F59E0B"/>
    <path d="M68,67 L43,67 A25,25 0 0,0 68,92 Z" fill="#7C3AED"/>
    <path d="M68,67 L68,92 A25,25 0 0,0 93,67 Z" fill="#2563EB"/>

    <!-- Dividers -->
    <line x1="68" y1="42" x2="68" y2="92" stroke="#0F172A" stroke-width="1.5"/>
    <line x1="43" y1="67" x2="93" y2="67" stroke="#0F172A" stroke-width="1.5"/>

    <!-- Center hole -->
    <circle cx="68" cy="67" r="9" fill="#0F172A"/>
  </g>
</svg>
